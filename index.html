<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Bmi Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div id="d1">
            <h1 id="tit">BMI Calculator</h1><br>
            <div id="main">
                
                <form id="bmiForm">
                    <label for="weight">Weight (kg):</label>
                    <input type="number" id="weight"><br>
                    <label for="height">Height (meters):</label>
                    <input type="number" id="height"><br>

                    <button type="button" id="calculate">Calculate BMI</button>
                    <br>
                    <span id="result" style="font-weight: bold;Color: #333;"></span>
                </form>
            </div>
        </div>
    </body>
</html>
